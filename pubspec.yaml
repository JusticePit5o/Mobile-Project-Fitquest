name: fitquest
description: A professional fitness tracking application with comprehensive features
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  
  # State Management
  provider: ^6.1.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # Utilities
  intl: ^0.18.1
  # Location & Maps
  geolocator: ^9.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dependency_overrides:
  positioned_tap_detector_2: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true